<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tashkent Metro Game</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <h1>Tashkent Metro Memory Game</h1>
    <div id="score">Found: <span id="found">0</span> / <span id="total">0</span></div>

    <input type="text"
           id="guess-input"
           placeholder="Type a station name…"
           autocomplete="off"
           spellcheck="false" />

    <div id="feedback"></div>

    <ul id="found-list"></ul>
    <script src="js/game.js"></script>
</body>
</html>
