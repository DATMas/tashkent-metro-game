<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tashkent Metro Game</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="container">
        <h1>Tashkent Metro Memory Game</h1>
        <div class="stats">
            <div>
                <div class="stat-label">Found</div>
                <div class="stat-value"><span id="found">0</span> / <span id="total">0</span></div>
            </div>
            <div>
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timer">0:00</div>
            </div>
        </div>

        <input type="text"
               id="guess-input"
               placeholder="Type a station name…"
               autocomplete="off"
               spellcheck="false" />

        <div id="feedback"></div>

        <ul id="found-list"></ul>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
